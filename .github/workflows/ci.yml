# Keep `name: CI` — release.yml triggers on it via workflow_run.
# Local: npm run validate (lint --fix). CI: lint:check, never validate.
name: CI

on:
  pull_request:
    branches: [main, next]
  push:
    branches: [main, next]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Lint
        run: npm run lint:check

      - name: Type check
        run: npm run build:compile

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker build check
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          platforms: linux/amd64
