name: Release

# Triggered by CI completing successfully on main/next. CI is the gate; release
# never runs unless CI passed. This catches admin force-pushes that bypass checks.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main, next]

permissions:
  id-token: write
  contents: write

jobs:
  release:
    name: Release
    if: >-
      github.event.workflow_run.event == 'push'
      && github.event.workflow_run.conclusion == 'success'
      && github.event.workflow_run.head_repository.full_name == github.repository
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-${{ github.event.workflow_run.head_branch }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            logfoxai/castellan:latest
            logfoxai/castellan:${{ github.event.workflow_run.head_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - run: npx autorel@^2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
